name: Generate Demo GIF

on:
  push:
    branches:
      - main # Or 'master' if that's your primary branch

concurrency:
  group: generate-demo-gif
  cancel-in-progress: false

permissions:
  contents: write # Needed to commit the GIF back to the repository

jobs:
  generate-demo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26' # Or your project's Go version

      - name: Build CLI
        run: go build -o hopcli ./main.go 
        # This creates 'hopcli' executable in the root

      - name: Make it executeable
        run: chmod +x hopcli

      - name: Create assets directory
        run: mkdir -p assets # Ensures the output directory for VHS exists

      - name: Generate GIF with VHS Action
        run: |
          sudo apt update
          sudo apt install ffmpeg ttyd
          go install github.com/charmbracelet/vhs@latest
          vhs tapes/demo.tape
      - name: Commit and push demo.webm
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7
        with:
          commit_message: "docs: Update demo.gif"
          file_pattern: "assets/demo.gif" # Only commit if this file changes
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
