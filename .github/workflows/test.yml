name: Run Go Tests

on:
  push:
    branches:
      - main # Or 'master' if that is your main branch
  pull_request:
    branches:
      - main # Or 'master'

jobs:
  build:
    uses: matt-riley/matt-riley-ci/.github/workflows/go-ci.yml@7bf33bf0eef269c4a4b1d85e1668dec14fb8ffff # v1
    with:
      go-version-file: go.mod
      run-fmt: true
